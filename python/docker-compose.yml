version: '3.8'

services:
  nodetide:
    build: .
    container_name: nodetide
    ports:
      - "4557:4557"
    volumes:
      - nodetide-data:/data
    environment:
      - NODETIDE_HOST=0.0.0.0
      - NODETIDE_PORT=4557
      - NODETIDE_DB_PATH=/data/nodetide.db
      - NODETIDE_WEB_ROOT=/app/web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4557/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  nodetide-data:
    driver: local
