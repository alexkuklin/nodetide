name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nodetide

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: python
            dockerfile: python/Dockerfile
          - name: golang
            dockerfile: golang/Dockerfile
    outputs:
      python: ${{ steps.result.outputs.python }}
      golang: ${{ steps.result.outputs.golang }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/nodetide-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=${{ matrix.variant.name }}-latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant.name }}-${{ github.sha }}
            type=ref,event=pr,prefix=${{ matrix.variant.name }}-pr-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:python-base-latest
            GIT_COMMIT=${{ github.sha }}

      - name: Set build result
        id: result
        if: always()
        run: |
          echo "${{ matrix.variant.name }}=${{ steps.build.outcome }}" >> $GITHUB_OUTPUT

      - name: Output image URI
        if: steps.build.outcome == 'success' && github.event_name != 'pull_request'
        run: |
          echo "Image pushed: ${{ matrix.variant.name }}"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.variant.name }}-${{ github.sha }}"

  deploy-python:
    needs: build
    if: always() && needs.build.outputs.python == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy python to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dblog.kuklin.eu
          username: deploy-nodetide
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /usr/local/bin/deploy-nodetide-wrapper.sh python

  deploy-golang:
    needs: build
    if: always() && needs.build.outputs.golang == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy golang to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dblog.kuklin.eu
          username: deploy-nodetide
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /usr/local/bin/deploy-nodetide-wrapper.sh golang
