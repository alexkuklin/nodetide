name: Build Base Images

on:
  # Manual trigger
  workflow_dispatch:
  # Trigger on dependency changes
  push:
    branches:
      - main
    paths:
      - 'python/pyproject.toml'
      - 'python/Dockerfile.base'
      - 'golang/go.mod'
      - 'golang/go.sum'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: distriblog

permissions:
  id-token: write
  contents: read

jobs:
  build-python-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/distriblog-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: python/Dockerfile.base
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:python-base-latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:python-base-${{ github.sha }}
          cache-from: type=gha,scope=python-base
          cache-to: type=gha,mode=max,scope=python-base
          platforms: linux/amd64,linux/arm64

      - name: Output image URI
        run: |
          echo "Base image pushed:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:python-base-latest"
